<!-- Exemplo simples de estrutura, ajuste com as suas tags se necessário -->
<input type="password" id="senhaInput" placeholder="Digite a senha de acesso">
<button onclick="verificarSenha()">Entrar</button>

<script>
  function verificarSenha() {
    const senhaDigitada = document.getElementById("senhaInput").value;
    
    // DEFINE A SUA SENHA AQUI DIRETO NO CÓDIGO
    const senhaCorreta = "lhmoraes"; 

    if (senhaDigitada === senhaCorreta) {
      // Salva no navegador que o usuário acertou a senha
      localStorage.setItem("site_autenticado", "true");
      // Redireciona para a página principal
      window.location.href = "index.html";
    } else {
      alert("Senha incorreta! Tente novamente.");
    }
  }
</script>
