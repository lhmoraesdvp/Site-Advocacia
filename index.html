<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site de Advocacia</title>
    <style>
        #tela-login {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: sans-serif;
        }
        .login-box {
            background: #222;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            max-width: 320px;
            width: 100%;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #0070f3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- 1. CONTEÚDO REAL DO SITE -->
    <div id="conteudo-site" style="display: none;">
        <h1>Bem-vindo ao Site de Advocacia</h1>
        <p>Este é o conteúdo protegido, liberado via validação de horário automatizada.</p>
    </div>

    <!-- 2. TELA DE VERIFICAÇÃO AUTOMÁTICA -->
    <div id="tela-login">
        <div class="login-box">
            <h2>Autenticando</h2>
            <p>Verificando credenciais de acesso cronológico...</p>
            <div class="loader"></div>
        </div>
    </div>

    <!-- 3. SCRIPT DE VALIDAÇÃO AUTOMÁTICA -->
    <script>
        function liberarSite() {
            document.getElementById("tela-login").style.display = "none";
            document.getElementById("conteudo-site").style.display = "block";
        }

        // Se já foi autenticado antes, entra direto sem revalidar a hora
        if (localStorage.getItem("site_autenticado") === "true") {
            liberarSite();
        } else {
            // Executa a validação automática assim que a página carrega
            validarHorarioBrasilia();
        }

        function validarHorarioBrasilia() {
            // 1. CONFIGURE AQUI A HORA E MINUTO DE ACESSO DESEJADOS (Exemplo: 17:30)
            const horaAlvo = 17;
            const minutoAlvo = 30;

            // Converter o alvo para minutos totais desde o início do dia
            const minutosAlvoTotais = (horaAlvo * 60) + minutoAlvo;

            // 2. CAPTURAR O HORÁRIO ATUAL DO CLIENTE FORÇANDO FUSO DE BRASÍLIA (UTC-3)
            const agora = new Date();
            
            // Convertemos para a string correspondente a Brasília e extraímos os dados
            const opcoesBrasilia = { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit', hour12: false };
            const [horaBr, minutoBr] = agora.toLocaleTimeString('pt-BR', opcoesBrasilia).split(':').map(Number);

            // Converter o horário atual de Brasília para minutos totais do dia
            const minutosAtuaisTotais = (horaBr * 60) + minutoBr;

            // 3. CALCULAR A DIFERENÇA EM MINUTOS
            const diferenca = Math.abs(minutosAtuaisTotais - minutosAlvoTotais);

            // 4. VERIFICAR SE ESTÁ DENTRO DA JANELA DE 5 MINUTOS (adiantado ou atrasado)
            if (diferenca <= 5) {
                localStorage.setItem("site_autenticado", "true");
                liberarSite();
            } else {
                // Se falhar, exibe uma mensagem clara e mantém bloqueado
                alert("Acesso negado. Fora do horário permitido para sincronização.");
                document.querySelector(".login-box h2").innerText = "Acesso Negado";
                document.querySelector(".login-box p").innerText = "Este site só permite o acesso na janela de horário autorizada.";
                document.querySelector(".loader").style.display = "none";
            }
        }
    </script>
</body>
</html>
